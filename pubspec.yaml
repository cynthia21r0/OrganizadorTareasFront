name: tareas
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  provider: ^6.1.2

  sqflite: ^2.3.3
  dio: ^5.4.3
  path: ^1.9.0
  path_provider: ^2.1.3

  intl: ^0.20.2
  crypto: ^3.0.3
  uuid: ^4.4.0
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:

  uses-material-design: true

  assets:
    - assets/icon/icon.png